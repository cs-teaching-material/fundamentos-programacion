<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Unidad 1 - Grupo B</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #dcdcdc;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

#loginModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  font-family: Arial, sans-serif;
}

.loginBox {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  width: 100%;
  max-width: 380px;
  text-align: center;
}

.loginBox h1 {
  color: #015583;
  font-size: 24px;
  margin-bottom: 10px;
}

.loginBox p {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
  line-height: 1.5;
}

.tiempoInfo {
  background: #f0f0f0;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #333;
}

.tiempoInfo strong {
  color: #15a;
  font-size: 16px;
}

.inputGroup {
  margin-bottom: 20px;
}

.inputGroup label {
  display: block;
  text-align: left;
  font-weight: bold;
  color: #333;
  margin-bottom: 8px;
  font-size: 14px;
}

.inputGroup input {
  width: 100%;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  font-family: monospace;
  text-transform: uppercase;
  transition: border-color 0.3s;
}

.inputGroup input:focus {
  outline: none;
  border-color: #15a;
  box-shadow: 0 0 8px rgba(17, 170, 204, 0.3);
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #015583 0%, #0d5c85 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(1, 85, 131, 0.3);
}

button:active {
  transform: translateY(0);
}

.errorMsg {
  color: #d32f2f;
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.errorMsg.show {
  display: block;
}

.ayuda {
  font-size: 12px;
  color: #999;
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid #eee;
}

.contenedor {
  width: 100%;
  max-width: 1000px;
  display: flex;
  justify-content: center;
}

img {
  width: 100%;
  height: auto;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
  background: white;
}

#examenContent {
  width: 100%;
  padding: 40px 0;
}

#examenContent.oculto {
  display: none;
}

.blocker {
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}
</style>
</head>

<body>



<div id="examenContent" class="oculto">
  <div class="contenedor">
    <img src="examen_unidad2B.png" alt="Examen Unidad 1 - Grupo A">
  </div>
</div>


</body>
</html>
